<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WATCHIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
      
      body, html {
        margin: 0;
        padding: 0;
        height: 100%; 
      }

      
      img {
        width: 100%;  
        height: 100%; 
        object-fit: cover;  
        display: block;
      }
    </style>
  </head>
  <body>
    <div>
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand">WATCHIT</a>
          <form class="d-flex" role="search" method="POST" action="{% url 'dashboard' %}">
            {% csrf_token %}
            <input class="form-control me-2" type="text" name="title" id="title" placeholder="Search for a movie" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
          </form>
        </div>
      </nav>
    </div>

    {% load static %}
    {% block content %}
      <img src="{% static 'WATCHIT.png' %}" alt="WATCHIT Logo">
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
